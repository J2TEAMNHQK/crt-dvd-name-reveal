<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A retro CRT / DVD screensaver-style animated name reveal — NGUYỄN HỒ QUANG KHẢI">
  <title>NGUYỄN HỒ QUANG KHẢI — Signal Lost</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- CRT overlay layers -->
  <div class="crt-overlay" aria-hidden="true">
    <div class="scanlines"></div>
    <div class="noise"></div>
    <div class="vignette"></div>
  </div>

  <!-- Floating text particles -->
  <div id="stage" role="img" aria-label="Animated name: Nguyễn Hồ Quang Khải">
    <span class="particle" data-index="0">NGUYỄN</span>
    <span class="particle" data-index="1">HỒ</span>
    <span class="particle" data-index="2">QUANG</span>
    <span class="particle" data-index="3">KHẢI</span>
  </div>

  <!-- Status indicator -->
  <div class="status-label" aria-hidden="true">
    <span class="status-text">SIGNAL LOST</span>
    <span class="status-dot"></span>
  </div>

  <!-- Background grain canvas -->
  <canvas id="grain" aria-hidden="true"></canvas>

  <script src="script.js"></script>
</body>
</html>
