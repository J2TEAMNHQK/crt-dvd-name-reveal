<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A retro CRT / DVD screensaver-style animated name reveal — customize with your own name in any language">
  <title>CRT Name Reveal — Signal Lost</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- CRT overlay layers -->
  <div class="crt-overlay" aria-hidden="true">
    <div class="scanlines"></div>
    <div class="noise"></div>
    <div class="vignette"></div>
  </div>

  <!-- Floating text particles -->
  <div id="stage" role="img" aria-label="Animated name reveal"></div>

  <!-- Status indicator -->
  <div class="status-label" aria-hidden="true">
    <span class="status-text">SIGNAL LOST</span>
    <span class="status-dot"></span>
  </div>

  <!-- Settings toggle button -->
  <button class="settings-toggle" id="settingsToggle" aria-label="Customize name" title="Customize">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="10" cy="10" r="3"/>
      <path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.5 3.5l1.4 1.4M15.1 15.1l1.4 1.4M3.5 16.5l1.4-1.4M15.1 4.9l1.4-1.4"/>
    </svg>
  </button>

  <!-- Settings panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h2>Customize</h2>
      <button class="settings-close" id="settingsClose" aria-label="Close settings">&times;</button>
    </div>

    <div class="settings-body">
      <p class="settings-hint">Enter name parts — each word becomes a floating particle. Supports all languages.</p>

      <div id="wordInputs" class="word-inputs">
        <!-- Dynamically generated -->
      </div>

      <div class="settings-actions">
        <button class="btn btn-add" id="addWord">+ Add Word</button>
        <button class="btn btn-apply" id="applySettings">Apply</button>
      </div>

      <div class="settings-presets">
        <span class="preset-label">Presets:</span>
        <button class="btn btn-preset" data-preset="nguyen-ho-quang-khai">Nguyễn Hồ Quang Khải</button>
        <button class="btn btn-preset" data-preset="john-doe">John Doe</button>
        <button class="btn btn-preset" data-preset="tanaka">田中 太郎</button>
        <button class="btn btn-preset" data-preset="kim">김 민수</button>
      </div>

      <div class="settings-share">
        <button class="btn btn-share" id="shareLink" title="Copy shareable link">🔗 Share Link</button>
        <span class="share-toast" id="shareToast">Copied!</span>
      </div>
    </div>
  </div>

  <!-- Background grain canvas -->
  <canvas id="grain" aria-hidden="true"></canvas>

  <script src="script.js"></script>
</body>
</html>
